<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundArb Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0b10; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 glass p-6 rounded-2xl">
            <h1 class="text-2xl font-bold text-blue-400">FundArb <span class="text-white text-sm font-normal">Arbitrage System</span></h1>
            <div id="status"><span class="px-3 py-1 rounded-full text-xs glass border-green-500/50 text-green-400">Connected</span></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <button onclick="scan()" class="bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold">Scan Markets</button>
            <div class="col-span-3 glass p-4 rounded-xl flex justify-around">
                <div class="text-center"><p class="text-xs text-gray-500">Opportunities</p><p id="count" class="text-xl font-bold">-</p></div>
                <div class="text-center"><p class="text-xs text-gray-500">Last Update</p><p id="time" class="text-xl font-mono text-gray-400">--:--:--</p></div>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-xs text-gray-400">
                    <tr><th class="p-4">Asset</th><th class="p-4">Delta Funding</th><th class="p-4">CoinDCX Funding</th><th class="p-4">Diff</th><th class="p-4">Net Yield</th></tr>
                </thead>
                <tbody id="results">
                    <tr><td colspan="5" class="p-8 text-center">Click Scan to start...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        async function scan() {
            try {
                const res = await fetch('/api/scan', { method: 'POST' });
                const json = await res.json();
                if (json.success) render(json.data);
                document.getElementById('time').innerText = new Date(json.ts).toLocaleTimeString();
            } catch (e) { alert('Scan failed'); }
        }
        function render(data) {
            document.getElementById('results').innerHTML = data.map(item => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold text-blue-400">${item.base}</td>
                    <td class="p-4">${item.deltaFunding}%</td>
                    <td class="p-4">${item.dcxFunding}%</td>
                    <td class="p-4 text-green-400 font-mono">${item.fundingDiff}%</td>
                    <td class="p-4 font-bold">${item.netYield}%</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
